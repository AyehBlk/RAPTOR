# =============================================================================
# Quick Salmon Pipeline Configuration
# RAPTOR v2.2.0 - Module 1: Quantify (UPDATED with Validation Schemas)
# =============================================================================
# Purpose: Fast pseudo-alignment for QC and profiling (NOT for final DE)
# Output:  results/quick_counts/quick_gene_counts.csv
# Validations: 8-10 checks (lightweight for QC)
# =============================================================================

pipeline:
  id: "quick_salmon"
  name: "Quick Salmon Quantification"
  version: "2.2.0"
  module: 1
  stage: 1
  description: "Fast pseudo-alignment with Salmon for QC and profiling"

# =============================================================================
# Input Configuration
# =============================================================================
input:
  # Sample sheet (required) - CSV with columns: sample_id, condition, batch, fastq_r1, fastq_r2
  sample_sheet: null
  
  # Salmon index directory (required)
  index: null
  
  # Transcript-to-gene mapping (optional, for gene-level aggregation)
  # Supports: TSV, CSV, or GTF format
  gene_map: null
  
  # Validation schemas (v2.2.0)
  validation:
    sample_sheet:
      required: true
      type: "file"
      extensions: [".csv"]
      hint: "CSV file with columns: sample_id, condition, batch, fastq_r1, fastq_r2"
    
    index:
      required: true
      type: "directory"
      must_contain: ["versionInfo.json"]  # Salmon index validation
      hint: "Valid Salmon index directory (build with: salmon index -t transcripts.fa -i salmon_index)"
    
    gene_map:
      required: false
      type: "file"
      extensions: [".csv", ".tsv", ".txt", ".gtf", ".gff"]
      hint: "Transcript-to-gene mapping (TSV/CSV with columns: transcript_id, gene_id)"

# =============================================================================
# Output Configuration (Architecture Compliant)
# =============================================================================
output:
  # Output directory (relative to project root)
  dir: "results/quick_counts"
  
  # Output file names - DISTINCT from Module 5 production counts
  counts_file: "quick_gene_counts.csv"
  tpm_file: "quick_tpm.csv"
  sample_info: "sample_info.csv"
  log_file: "quick_salmon.log"
  
  # Keep individual sample quant directories
  keep_quant_files: false

# =============================================================================
# Salmon Parameters
# =============================================================================
salmon:
  # Library type (A = automatic detection, recommended)
  # Valid options: A, IU, ISR, ISF, MU, MSR, MSF, OU, OSR, OSF, SF, SR, U
  lib_type: "A"
  
  # Validation schema (v2.2.0)
  lib_type_validation:
    type: "choice"
    choices: ["A", "IU", "ISR", "ISF", "MU", "MSR", "MSF", "OU", "OSR", "OSF", "SF", "SR", "U"]
    default: "A"
    hint: "Use 'A' for auto-detect (recommended), 'ISR' for dUTP stranded"
  
  # Validate mappings - improves accuracy (recommended)
  validate_mappings: true
  
  # GC bias correction (recommended for most datasets)
  gc_bias: true
  
  # Sequence-specific bias correction (optional, slower)
  seq_bias: false
  
  # Number of bootstrap samples
  # 0 = disabled (fastest, recommended for M1 quick profiling)
  # 100+ = enable for transcript-level DE with sleuth (use in M5)
  num_bootstraps: 0
  
  # Additional Salmon options (advanced users)
  extra_options: ""

# =============================================================================
# Single-End Read Options
# =============================================================================
single_end:
  # Fragment length mean (estimated from Bioanalyzer/TapeStation)
  fragment_length_mean: 200
  
  # Fragment length standard deviation
  fragment_length_sd: 80
  
  # Validation schema (v2.2.0)
  validation:
    fragment_length_mean:
      type: "positive_integer"
      min: 50
      max: 1000
      default: 200
      hint: "Typical range: 150-300 for standard libraries"
    
    fragment_length_sd:
      type: "positive_integer"
      min: 10
      max: 500
      default: 80
      hint: "Typical range: 50-100 for standard libraries"

# =============================================================================
# Computational Resources
# =============================================================================
resources:
  # Threads per sample
  threads: 8
  
  # Memory limit (GB) - Salmon is memory efficient
  memory_gb: 16
  
  # Run samples in parallel (experimental)
  parallel_samples: false
  
  # Validation schema (v2.2.0)
  validation:
    threads:
      type: "positive_integer"
      min: 1
      max: 128
      default: 8
      hint: "More threads = faster, but diminishing returns after 16"
    
    memory_gb:
      type: "positive_integer"
      min: 4
      max: 256
      default: 16
      hint: "Salmon typically needs 8-16GB"

# =============================================================================
# Workflow Integration
# =============================================================================
workflow:
  stage: 1
  module: "M1"
  
  # Commands to run after this module completes
  next_steps:
    - command: "raptor qc --counts results/quick_counts/quick_gene_counts.csv"
      description: "Module 2: Quality Assessment & Outlier Detection"
    - command: "raptor profile --counts results/quick_counts/quick_gene_counts.csv"
      description: "Module 3: Data Profiling (32 features)"
    - command: "raptor recommend"
      description: "Module 4: Pipeline Recommendation"

# =============================================================================
# Validation Summary (v2.2.0)
# =============================================================================
# This Quick Salmon pipeline includes 8-10 validation checks (lightweight):
#
# 1. Sample sheet exists and has .csv extension
# 2. Sample sheet contains required columns
# 3. All FASTQ files exist
# 4. Salmon index directory exists
# 5. Salmon index contains versionInfo.json (valid index)
# 6. Threads is positive integer (1-128)
# 7. Library type is one of 13 valid choices
# 8. Fragment length is reasonable (50-1000)
# 9. Fragment SD is reasonable (10-500)
# 10. Salmon is installed and accessible
#
# NOTE: This is LIGHTER than Module 5 production pipelines (15+ checks)
#       because this is for QC/profiling, not final analysis.
# =============================================================================
