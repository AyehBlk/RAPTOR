# =============================================================================
# RAPTOR v2.2.0 - Salmon Pipeline Configuration
# =============================================================================
#
# This configuration file defines default parameters for the Salmon pipeline.
# Parameters can be overridden via CLI or programmatically.
#
# Author: Ayeh Bolouki
# Version: 2.2.0
# =============================================================================

# =============================================================================
# PIPELINE METADATA
# =============================================================================
pipeline:
  name: salmon
  version: 2.2.0
  description: Salmon pseudo-alignment (fastest, no BAM)
  stage: 2  # Production pipeline
  module: M5

# =============================================================================
# SALMON QUANTIFICATION PARAMETERS
# =============================================================================
salmon:
  # Library type (auto-detect recommended)
  library_type: "A"         # A=auto, ISF/ISR=stranded, IU=unstranded
  
  # Bootstrapping
  bootstraps: 0             # 0=disabled, 100+=uncertainty estimation
  
  # Bias correction (highly recommended)
  gc_bias: true             # GC content bias correction
  seq_bias: true            # Sequence-specific bias correction
  pos_bias: false           # Position-specific bias (experimental)
  
  # Selective alignment (recommended for accuracy)
  validate_mappings: true   # Enable selective alignment
  min_score_fraction: 0.65  # Minimum alignment score (0-1)
  consensus_slack: 0.35     # Consensus slack for alignment (0-1)
  
  # Advanced options
  range_factorization_bins: 4       # Range factorization bins
  num_gibbs_samples: 0              # Gibbs sampling (0=disabled)
  incompatible_prior: 0.0           # Incompatible prior (0-1)
  
  # Output options
  write_unmapped_names: false       # Write unmapped read names
  no_length_correction: false       # Disable length correction
  no_effective_length_correction: false  # Disable effective length correction
  use_vbopt: false                  # Use variational Bayesian optimization
  
  # Single-end parameters (optional)
  fragment_length: null     # Mean fragment length (FRAG_LEN for SE)
  fragment_sd: null         # Fragment length SD (FRAG_SD for SE)
  
  # Gene aggregation
  tx2gene: null             # Path to transcript-to-gene mapping file

# =============================================================================
# LIBRARY TYPE GUIDE
# =============================================================================
library_types:
  auto: "A"                 # Auto-detect (recommended)
  
  # Inward-facing reads (most common)
  inward_unstranded: "IU"
  inward_stranded_forward: "ISF"    # Ligation protocol
  inward_stranded_reverse: "ISR"    # dUTP protocol (most common)
  
  # Match-specific
  match_unstranded: "MU"
  match_stranded_forward: "MSF"
  match_stranded_reverse: "MSR"
  
  # Outward-facing reads (rare)
  outward_unstranded: "OU"
  outward_stranded_forward: "OSF"
  outward_stranded_reverse: "OSR"
  
  # Stranded (orientation unknown)
  stranded_forward: "SF"
  stranded_reverse: "SR"
  
  # Unstranded
  unstranded: "U"

# =============================================================================
# EXECUTION ENVIRONMENT - DOCKER
# =============================================================================
docker:
  enabled: false  # Set to true to use Docker containers
  
  # Docker image
  image: combinelab/salmon:1.10.0
  
  # Docker options
  volumes:  # Additional volumes to mount
    - /data:/data
    - /ref:/ref:ro
  workdir: /work

# =============================================================================
# EXECUTION ENVIRONMENT - HPC CLUSTER
# =============================================================================
hpc:
  enabled: false  # Set to true for HPC execution
  
  # Module name (adjust for your HPC system)
  module: salmon
  
  # Resource requirements
  memory: 8G           # Moderate memory usage
  time: "4:00:00"      # Wall time
  nodes: 1
  tasks_per_node: 1
  cpus_per_task: 8     # Override with --threads

# =============================================================================
# PERFORMANCE SETTINGS
# =============================================================================
performance:
  threads: 8           # Number of CPU threads
  memory_gb: 8         # Memory in GB (Salmon uses moderate amount)
  
  # Temporary directory
  temp_dir: null       # Uses system default if null

# =============================================================================
# OUTPUT SETTINGS
# =============================================================================
output:
  # Main output directory structure
  base_dir: results/production
  
  # Output files
  gene_counts: gene_counts.csv   # Gene count matrix (if tx2gene provided)
  tx_counts: tx_counts.csv       # Transcript count matrix
  tpm: tpm.csv                   # TPM normalized matrix
  quant_dir: quant/              # Per-sample quantification directories
  logs_dir: logs/                # Log files
  
  # Keep intermediate files
  keep_unmapped: false           # Keep unmapped reads (if enabled)

# =============================================================================
# VALIDATION SETTINGS (v2.2.0)
# =============================================================================
validation:
  # Enable input validation (recommended)
  validate_inputs: true
  
  # Validation rules
  min_threads: 1
  max_threads: 128
  min_memory_gb: 4
  max_memory_gb: 512
  min_bootstraps: 0
  max_bootstraps: 1000
  
  # Library type validation
  valid_library_types: ['A', 'IU', 'ISF', 'ISR', 'MU', 'MSF', 'MSR', 
                        'OU', 'OSF', 'OSR', 'SF', 'SR', 'U']
  
  # Score fraction validation
  min_score_fraction: 0.0
  max_score_fraction: 1.0
  
  # Fragment length validation (for single-end)
  min_fragment_length: 50
  max_fragment_length: 1000
  min_fragment_sd: 1
  max_fragment_sd: 200
  
  # Index validation
  check_index_exists: true  # Verify index exists
  
  # Sample sheet validation
  check_fastq_exists: true  # Verify FASTQ files exist
  check_sample_ids: true    # Check for duplicate sample IDs

# =============================================================================
# ERROR HANDLING (v2.2.0)
# =============================================================================
error_handling:
  # Fail fast or continue on error
  fail_fast: true  # Stop pipeline on first error
  
  # Retry settings
  max_retries: 0  # Number of retries for failed samples
  
  # Logging
  log_level: INFO  # DEBUG, INFO, WARNING, ERROR, CRITICAL
  save_logs: true  # Save logs to files

# =============================================================================
# QUALITY CONTROL THRESHOLDS (Optional)
# =============================================================================
qc_thresholds:
  # Minimum mapping rate to pass QC
  min_mapping_rate: 50.0  # Percentage
  
  # Warn if below these thresholds
  warn_mapping_rate: 70.0
  
  # Minimum number of reads processed
  min_reads_processed: 1000000  # 1 million reads

# =============================================================================
# BOOTSTRAP RECOMMENDATIONS
# =============================================================================
bootstrap:
  # Bootstrap guidelines
  disabled: 0              # No bootstraps (fastest, no uncertainty)
  minimal: 30              # Minimal bootstraps for quick check
  standard: 100            # Standard for differential expression
  publication: 200         # Publication-quality uncertainty estimates
  
  # Use cases
  quick_de: 0              # Quick differential expression (DESeq2/edgeR)
  standard_de: 100         # Standard differential expression (with sleuth)
  isoform_analysis: 200    # Isoform-level analysis needs more bootstraps

# =============================================================================
# BIAS CORRECTION RECOMMENDATIONS
# =============================================================================
bias_correction:
  # Recommended settings by data type
  standard_rna_seq:
    gc_bias: true
    seq_bias: true
    pos_bias: false
  
  degraded_rna:
    gc_bias: true
    seq_bias: true
    pos_bias: true          # Enable for degraded samples
  
  ffpe_samples:
    gc_bias: true
    seq_bias: true
    pos_bias: true          # FFPE samples have positional bias
  
  quick_mode:
    gc_bias: false          # Disable for speed
    seq_bias: false
    pos_bias: false

# =============================================================================
# SELECTIVE ALIGNMENT RECOMMENDATIONS
# =============================================================================
selective_alignment:
  # --validateMappings options
  high_accuracy:
    validate_mappings: true
    min_score_fraction: 0.65
    consensus_slack: 0.35
  
  balanced:
    validate_mappings: true
    min_score_fraction: 0.60
    consensus_slack: 0.40
  
  speed:
    validate_mappings: false  # Faster but less accurate

# =============================================================================
# NOTES FOR v2.2.0
# =============================================================================
#
# New in v2.2.0:
# - Full input validation with clear error messages
# - Enhanced error handling with @handle_errors decorator
# - Better documentation with examples
# - Validation schemas for all parameters
# - Quality control thresholds
# - Library type validation
#
# Advantages of Salmon:
# - Very fast: 100+ samples in a few hours
# - GC bias correction (better than Kallisto)
# - Sequence bias correction
# - Selective alignment (--validateMappings)
# - Moderate memory: ~8GB (vs 4GB Kallisto, 32GB STAR)
# - No BAM files: saves disk space
# - Well-maintained: active development
# - Widely used: standard in the field
#
# Disadvantages:
# - Slower than Kallisto (but more accurate)
# - Higher memory than Kallisto
# - No BAM files (can't visualize alignments)
# - Less accurate than alignment-based methods
#
# Best for:
# - Standard RNA-seq differential expression
# - When bias correction is important
# - Balance between speed and accuracy
# - High-throughput projects
# - Transcript isoform analysis
# - When you don't need BAM files
#
# Not recommended for:
# - Novel transcript discovery
# - When you need BAM files
# - Systems with <4GB RAM
# - When absolute fastest speed is required (use Kallisto)
#
# Library Type Selection:
# - Use 'A' (auto-detect) if unsure
# - ISR: dUTP stranded (most common)
# - ISF: Ligation stranded
# - IU: Unstranded
# - Check your library prep protocol
#
# Bootstrap Guidelines:
# - 0: Fastest, use with DESeq2/edgeR
# - 100: Standard, use with sleuth
# - 200+: Publication quality
# - Adds ~1-2 min per sample per bootstrap
#
# Bias Correction:
# - gcBias: Highly recommended (on by default)
# - seqBias: Highly recommended (on by default)
# - posBias: Only for degraded samples or FFPE
# - Adds ~10-20% runtime
# - Significantly improves accuracy
#
# Selective Alignment:
# - --validateMappings: Highly recommended (on by default)
# - Improves accuracy with minimal speed cost
# - Validates mapping locations
# - Filters spurious alignments
#
# =============================================================================
