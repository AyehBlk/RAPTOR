# =============================================================================
# RAPTOR v2.2.0 - STAR + featureCounts Pipeline Configuration
# =============================================================================
#
# Standard alignment-based workflow with STAR and featureCounts.
# Produces BAM files and gene-level quantification.
#
# Author: Ayeh Bolouki
# Version: 2.2.0
# =============================================================================

# =============================================================================
# PIPELINE METADATA
# =============================================================================
pipeline:
  name: star_featurecounts
  version: 2.2.0
  description: STAR alignment + featureCounts (standard, produces BAM)
  stage: 2  # Production pipeline
  module: M5

# =============================================================================
# STAR ALIGNMENT PARAMETERS
# =============================================================================
star:
  # Two-pass mode (recommended for better sensitivity)
  two_pass_mode: Basic       # 'Basic' or 'None'
  
  # Output format
  out_sam_type: "BAM SortedByCoordinate"  # Most common
  
  # Quantification mode
  quant_mode: GeneCounts     # Generate gene counts
  
  # Multi-mapping
  out_filter_multimap_nmax: 20        # Max loci per read
  
  # Mismatch filtering
  out_filter_mismatch_nmax: 10        # Max mismatches
  out_filter_mismatch_nover_read_lmax: 0.04  # 4% of read length
  
  # Intron constraints
  align_intron_min: 20               # Min intron length
  align_intron_max: 1000000          # Max intron length (1Mb)
  
  # Paired-end constraints
  align_mates_gap_max: 1000000       # Max distance between mates
  
  # Splice junction
  align_sjdb_overhang_min: 1         # Min overhang for junctions
  
  # Output options
  out_sam_unmapped: Within           # Include unmapped in BAM
  out_sam_attributes: Standard       # SAM attributes
  out_bam_compression: 1             # Compression level (1-10)
  limit_bam_sort_ram: 0              # RAM limit for sorting (0=auto)
  
  # Chimeric alignment
  chimeric_segment_min: 12
  chimeric_junction_overhang_min: 12

# =============================================================================
# FEATURECOUNTS QUANTIFICATION PARAMETERS
# =============================================================================
featurecounts:
  # Feature selection
  feature_type: exon         # GTF feature (typically "exon")
  attribute_type: gene_id    # GTF attribute (typically "gene_id")
  
  # Strandedness
  strand_specific: 0         # 0=unstranded, 1=stranded, 2=reverse
  
  # Overlap requirements
  min_overlap: 1             # Min overlap with feature
  
  # Multi-mapping reads
  count_multimapping: false  # Count multi-mapping reads (-M)
  count_primary: false       # Count primary alignments only (--primary)
  count_fraction: false      # Fractional counting (--fraction)
  
  # Paired-end options
  count_paired_end: true     # Count read pairs (--countReadPairs)
  require_both_ends_mapped: false  # Both ends must map (-B)
  count_chimeric: false      # Count chimeric fragments (-C)

# =============================================================================
# EXECUTION ENVIRONMENT - DOCKER
# =============================================================================
docker:
  enabled: false
  
  # Docker images (from BioContainers)
  star_image: quay.io/biocontainers/star:2.7.10b
  subread_image: quay.io/biocontainers/subread:2.0.3
  samtools_image: quay.io/biocontainers/samtools:1.17

# =============================================================================
# EXECUTION ENVIRONMENT - HPC CLUSTER
# =============================================================================
hpc:
  enabled: false
  
  # Module names
  modules:
    - STAR/2.7.10b
    - subread/2.0.3
    - samtools/1.17
  
  # Resource requirements (HIGH for STAR!)
  memory: 32G              # STAR needs high memory
  time: "12:00:00"         # Long runtime
  nodes: 1
  tasks_per_node: 1
  cpus_per_task: 8

# =============================================================================
# PERFORMANCE SETTINGS
# =============================================================================
performance:
  threads: 8
  memory_gb: 32            # STAR requires high memory!

# =============================================================================
# OUTPUT SETTINGS
# =============================================================================
output:
  base_dir: results/production
  gene_counts: gene_counts.csv
  bam_dir: bam/
  star_dir: star/          # STAR output directory
  logs_dir: logs/
  keep_bam: true           # Always keep BAMs for this pipeline

# =============================================================================
# VALIDATION SETTINGS (v2.2.0)
# =============================================================================
validation:
  validate_inputs: true
  
  # Numeric ranges
  min_threads: 1
  max_threads: 128
  min_memory_gb: 16        # STAR minimum
  max_memory_gb: 512
  
  # GTF validation
  require_gtf: true
  require_gtf_extension: true
  
  # STAR parameter validation
  valid_two_pass_modes: ['None', 'Basic']
  valid_sam_types: ['BAM SortedByCoordinate', 'BAM Unsorted', 'SAM']
  valid_quant_modes: ['GeneCounts', 'TranscriptomeSAM', '-']
  
  # featureCounts validation
  valid_strand_specific: [0, 1, 2]
  min_overlap_min: 1
  
  # Check file existence
  check_gtf_exists: true
  check_index_exists: true
  check_fastq_exists: true

# =============================================================================
# ERROR HANDLING (v2.2.0)
# =============================================================================
error_handling:
  fail_fast: true
  max_retries: 0
  log_level: INFO
  save_logs: true

# =============================================================================
# QUALITY CONTROL THRESHOLDS
# =============================================================================
qc_thresholds:
  # STAR mapping
  min_unique_mapping_rate: 50.0
  warn_unique_mapping_rate: 70.0
  
  # featureCounts assignment
  min_assignment_rate: 40.0
  warn_assignment_rate: 60.0

# =============================================================================
# PARAMETER GUIDES
# =============================================================================

# Two-pass mode guide
two_pass_guide:
  None:
    description: "Single-pass alignment"
    use_when: "Speed is critical, known annotations"
    speed: "Faster"
    sensitivity: "Lower"
  Basic:
    description: "Two-pass alignment (recommended)"
    use_when: "Standard RNA-seq, novel junctions"
    speed: "Slower (~2x time)"
    sensitivity: "Higher"

# Strandedness guide
strandedness_guide:
  0:
    name: "Unstranded"
    description: "Standard RNA-seq (most common)"
    library_prep: "Standard, TruSeq"
  1:
    name: "Stranded (forward)"
    description: "First read forward strand"
    library_prep: "Ligation-based"
  2:
    name: "Stranded (reverse)"
    description: "First read reverse strand (dUTP)"
    library_prep: "dUTP, Illumina stranded"

# =============================================================================
# NOTES FOR v2.2.0
# =============================================================================
#
# New in v2.2.0:
# - Full input validation with clear error messages
# - Enhanced error handling with @handle_errors
# - Comprehensive parameter validation
# - GTF file validation
# - STAR index validation
# - Intron length relationship checks
# - Quality control thresholds
#
# STAR + featureCounts Advantages:
# - Most accurate quantification
# - BAM files for visualization/variants
# - Gold standard for RNA-seq
# - Two-pass mode for novel junctions
# - Well-established and trusted
# - Publication quality
#
# STAR + featureCounts Disadvantages:
# - High memory (~32GB minimum)
# - Slower than pseudo-aligners
# - Large BAM files (disk space)
# - More complex setup
#
# When to Use STAR + featureCounts:
# - Need BAM files for IGV/UCSC
# - Variant calling from RNA-seq
# - Novel isoform discovery
# - Publication-quality analysis
# - When accuracy is critical
# - Have sufficient memory (32GB+)
#
# When NOT to Use:
# - Limited memory (<32GB)
# - Don't need BAM files
# - Speed is critical
# - Limited disk space
# - Quick preliminary analysis
#
# Memory Requirements:
# - Human genome: 32GB minimum
# - Mouse genome: 32GB minimum
# - Larger genomes: 48-64GB
# - Always allocate extra for safety
#
# Time Estimates:
# - Single sample: 30-60 minutes
# - 100M reads: ~1 hour
# - Two-pass mode: 2x slower
# - featureCounts: +5-10 minutes
#
# =============================================================================
