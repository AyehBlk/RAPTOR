# =============================================================================
# Quick Kallisto Pipeline Configuration
# RAPTOR v2.2.0 - Module 1: Quantify
# =============================================================================
# Purpose: Ultra-fast pseudo-alignment for QC and profiling (NOT for final DE)
# Output:  results/quick_counts/quick_gene_counts.csv
# =============================================================================

pipeline:
  id: "quick_kallisto"
  name: "Quick Kallisto Quantification"
  version: "2.2.0"
  module: 1
  stage: 1
  description: "Ultra-fast pseudo-alignment with Kallisto for QC and profiling"

# =============================================================================
# Input Configuration
# =============================================================================
input:
  # Sample sheet (required) - CSV with columns: sample_id, condition, batch, fastq_r1, fastq_r2
  sample_sheet: null
  
  # Kallisto index file (required) - .idx file
  index: null
  
  # Transcript-to-gene mapping (required for gene-level counts)
  # Supports: TSV, CSV, or GTF format
  gene_map: null

# =============================================================================
# Output Configuration (Architecture Compliant)
# =============================================================================
output:
  # Output directory (relative to project root)
  dir: "results/quick_counts"
  
  # Output file names - DISTINCT from Module 5 production counts
  counts_file: "quick_gene_counts.csv"
  tpm_file: "quick_tpm.csv"
  sample_info: "sample_info.csv"
  log_file: "quick_kallisto.log"
  
  # Keep individual sample quant directories
  keep_quant_files: false

# =============================================================================
# Kallisto Parameters
# =============================================================================
kallisto:
  # Strand-specific options (leave empty for unstranded)
  # Options: rf-stranded, fr-stranded, or empty
  strand: ""
  
  # Number of bootstrap samples
  # 0 = disabled (fastest, recommended for M1 quick profiling)
  # 100+ = enable for transcript-level DE with sleuth (use in M5)
  num_bootstraps: 0
  
  # Random seed for reproducibility (only used with bootstraps)
  seed: 42
  
  # Additional Kallisto options (advanced users)
  extra_options: ""

# =============================================================================
# Single-End Read Options (CRITICAL!)
# =============================================================================
# NOTE: Kallisto CANNOT estimate fragment length from single-end data!
# You MUST provide these values for single-end reads.
# Estimate from Bioanalyzer/TapeStation or use defaults.
# =============================================================================
single_end:
  # Fragment length mean (REQUIRED for single-end)
  fragment_length: 200
  
  # Fragment length standard deviation (REQUIRED for single-end)
  fragment_sd: 20

# =============================================================================
# Computational Resources
# =============================================================================
resources:
  # Threads per sample
  threads: 8
  
  # Memory limit (GB) - Kallisto is very memory efficient
  memory_gb: 8
  
  # Run samples in parallel (experimental)
  parallel_samples: false

# =============================================================================
# Workflow Integration
# =============================================================================
workflow:
  stage: 1
  module: "M1"
  
  # Commands to run after this module completes
  next_steps:
    - command: "raptor qc --counts results/quick_counts/quick_gene_counts.csv"
      description: "Module 2: Quality Assessment & Outlier Detection"
    - command: "raptor profile --counts results/quick_counts/quick_gene_counts.csv"
      description: "Module 3: Data Profiling (32 features)"
    - command: "raptor recommend"
      description: "Module 4: Pipeline Recommendation"

# =============================================================================
# Validation Schemas - v2.2.0
# =============================================================================
validation:
  sample_sheet:
    type: file
    required: true
    extension: .csv
    hint: "Must be CSV with columns: sample_id, condition, batch, fastq_r1, fastq_r2"
    error_message: "Sample sheet not found or invalid format"
  
  index:
    type: file
    required: true
    extension: .idx
    hint: "Build with: kallisto index -i index.idx transcripts.fa"
    error_message: "Kallisto index not found or invalid"
  
  threads:
    type: int
    range: [1, 128]
    default: 8
    hint: "Number of threads per sample"
    error_message: "Threads must be between 1-128"
  
  fragment_length:
    type: int
    range: [50, 1000]
    default: 200
    required_for: single-end
    critical: true
    hint: "REQUIRED for single-end! Estimate from Bioanalyzer or use 200"
    error_message: "Fragment length required for single-end: 50-1000 bp"
  
  fragment_sd:
    type: int
    range: [10, 500]
    default: 20
    required_for: single-end
    critical: true
    hint: "REQUIRED for single-end! Typical value: 20"
    error_message: "Fragment SD required for single-end: 10-500 bp"
  
  bootstraps:
    type: int
    range: [0, 1000]
    default: 0
    hint: "0 = disabled (fastest), 100+ for transcript-level DE"
    error_message: "Bootstraps must be between 0-1000"
  
  gene_map:
    type: file
    required: false
    extensions: [.csv, .tsv, .txt, .gtf]
    hint: "Transcript-to-gene mapping for gene-level counts"
    error_message: "Gene map file not found"

# =============================================================================
# Error Messages - v2.2.0
# =============================================================================
error_messages:
  single_end_no_fragment_length: |
    Single-end reads detected but fragment length not provided.
    
    CRITICAL: Kallisto CANNOT estimate fragment length from single-end data!
    
    You MUST provide both:
      --fragment-length <mean>  (e.g., 200)
      --fragment-sd <sd>        (e.g., 20)
    
    How to estimate:
      • Bioanalyzer/TapeStation: Direct measurement
      • Picard CollectInsertSizeMetrics: From paired-end BAM
      • Default: 200 ± 20 bp (typical Illumina)
  
  index_not_idx: |
    Kallisto index must have .idx extension.
    
    Build a new index:
      kallisto index -i transcripts.idx transcripts.fa.gz
  
  kallisto_not_found: |
    Kallisto not found in PATH.
    
    Install with conda:
      conda install -c bioconda kallisto
  
  low_pseudoalignment: |
    Low pseudoalignment rate detected (<50%).
    
    Possible causes:
      • Index doesn't match your organism
      • Poor quality FASTQ files
      • Adapter contamination
    
    Solutions:
      • Verify index organism matches samples
      • Run FastQC on FASTQ files
      • Trim adapters with Trim Galore
